# Xiaozhi Esp32 Workflow Add New Board Support

## Action

Follow the add-new-board-support workflow:
1. Create new board directory under main/boards/<vendor>/<board-name>/
2. Add config.h, config.json, and main source file (e.g., <board-name>.cc)
3. Add README.md for the board
4. Optionally add extra files (e.g., led_strip_control.cc/h, power_manager.h, lcd_init_cmds.h)
5. Update main/CMakeLists.txt and main/Kconfig.projbuild to include the new board

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: main/boards/*/<board-name>/config.h, main/boards/*/<board-name>/config.json, main/boards/*/<board-name>/*.cc

