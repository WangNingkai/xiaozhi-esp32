# Xiaozhi Esp32 Workflow Add New Board Support

## Action

Follow the add-new-board-support workflow:
1. Add new board directory under main/boards/[vendor]/[board-name]/
2. Create config.h, config.json, and main source file ([board-name].cc) in the new directory
3. Add README.md for the board
4. Optionally add other board-specific files (e.g., lcd_init_cmds.h, led_strip_control.h, power_manager.h, etc.)
5. Update main/CMakeLists.txt and main/Kconfig.projbuild to include the new board

## Evidence

- Workflow detected from commit patterns
- Frequency: ~4x per month
- Files: main/CMakeLists.txt, main/Kconfig.projbuild, main/boards/*/*/config.h

